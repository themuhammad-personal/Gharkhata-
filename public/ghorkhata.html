<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>ঘরখাতা — স্মার্ট খরচ ট্র্যাকার</title>
<meta name="theme-color" content="#04382b" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --paper: #f6f3ec;
  --card: #ffffff;
  --ink: #1c2420;
  --ink-soft: #5c6660;
  --ink-faint: #98a29b;
  --line: rgba(28,36,32,0.08);
  --emerald: #0b8a5f;
  --emerald-deep: #04382b;
  --emerald-mid: #0a5c42;
  --emerald-light: #ddf3e9;
  --amber: #d98324;
  --amber-light: #fdf1df;
  --rose: #d43d51;
  --rose-light: #fde7ea;
  --sky: #0f74a8;
  --font: 'Hind Siliguri', 'Noto Sans Bengali', system-ui, sans-serif;
  --shadow-sm: 0 1px 2px rgba(20,30,25,0.05), 0 3px 10px -2px rgba(20,30,25,0.07);
  --shadow-md: 0 2px 6px rgba(20,30,25,0.06), 0 10px 28px -6px rgba(20,30,25,0.12);
  --r-lg: 20px;
  --r-md: 15px;
}

html, body {
  font-family: var(--font);
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: contain;
}

.paper-bg {
  min-height: 100vh;
  background-color: var(--paper);
  background-image:
    radial-gradient(at 15% 0%, rgba(11,138,95,0.07) 0, transparent 45%),
    radial-gradient(at 90% 8%, rgba(217,131,36,0.05) 0, transparent 40%);
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.14); border-radius: 999px; }

/* ── Animations ── */
@keyframes slideUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes pop { 0% { transform:scale(0.94); opacity:0; } 60% { transform:scale(1.015); } 100% { transform:scale(1); opacity:1; } }
@keyframes slideFromLeft { from { transform:translateX(-100%); } to { transform:translateX(0); } }
@keyframes slideFromBottom { from { transform:translateY(100%); } to { transform:translateY(0); } }
@keyframes growBar { from { width: 0; } }
@keyframes riseBar { from { transform: scaleY(0); } to { transform: scaleY(1); } }
.anim-slide-up { animation: slideUp .35s cubic-bezier(.22,.9,.32,1) both; }
.anim-fade-in { animation: fadeIn .22s ease-out both; }
.anim-pop { animation: pop .35s cubic-bezier(.22,.9,.32,1) both; }
.anim-slide-left { animation: slideFromLeft .3s cubic-bezier(.22,.9,.32,1) both; }
.anim-sheet { animation: slideFromBottom .32s cubic-bezier(.22,.9,.32,1) both; }

/* ── Layout ── */
#app { max-width: 448px; margin: 0 auto; min-height: 100vh; }
.page { display: none; }
.page.active { display: block; }

/* ── Top Bar ── */
#topbar {
  position: sticky; top: 0; z-index: 20;
  background: rgba(246,243,236,0.82);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
  padding: 14px 16px 12px;
}
.topbar-row1 { display: flex; align-items: center; justify-content: space-between; }
.topbar-logo { display: flex; align-items: center; gap: 9px; }
.logo-mark {
  width: 36px; height: 36px; border-radius: 12px;
  background: linear-gradient(140deg, var(--emerald), var(--emerald-deep));
  display: flex; align-items: center; justify-content: center; color: #fff;
  box-shadow: 0 3px 10px rgba(11,138,95,0.35);
}
.topbar-logo h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.4px; color: var(--emerald-deep); line-height: 1; }
.topbar-logo p { font-size: 10px; color: var(--ink-faint); font-weight: 500; line-height: 1.2; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 13px; border: 1px solid var(--line);
  background: var(--card); cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--ink-soft); box-shadow: var(--shadow-sm); transition: transform .12s;
}
.icon-btn:active { transform: scale(0.92); }

.month-nav {
  margin-top: 12px; display: flex; align-items: center; justify-content: space-between;
  background: var(--card); border-radius: 15px; padding: 5px;
  border: 1px solid var(--line); box-shadow: var(--shadow-sm);
}
.month-nav-btn {
  width: 34px; height: 34px; border-radius: 11px; border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--ink-faint); transition: background .15s, transform .1s;
}
.month-nav-btn:hover { background: rgba(0,0,0,0.045); color: var(--ink-soft); }
.month-nav-btn:active { transform: scale(0.88); }
.month-label-btn {
  display: flex; align-items: center; gap: 8px; border: none; background: transparent;
  cursor: pointer; padding: 6px 12px; border-radius: 11px; transition: background .15s;
  font-family: var(--font);
}
.month-label-btn:hover { background: rgba(0,0,0,0.04); }
.month-label-btn > span:first-child { font-size: 14px; font-weight: 700; color: var(--ink); }
.badge-current {
  background: var(--emerald-light); color: var(--emerald-mid);
  font-size: 10px; font-weight: 700; border-radius: 99px; padding: 2px 9px;
}

/* ── Hero Summary ── */
#summary { padding: 14px 16px 4px; }
.hero-card {
  position: relative; overflow: hidden; border-radius: 24px; color: #fff;
  background: linear-gradient(150deg, #0c6b4a 0%, var(--emerald-deep) 78%);
  padding: 20px 20px 16px;
  box-shadow: 0 10px 32px -8px rgba(4,56,43,0.45);
}
.hero-deco1 { position: absolute; right: -46px; top: -46px; width: 170px; height: 170px; border-radius: 50%; background: rgba(255,255,255,0.06); }
.hero-deco2 { position: absolute; right: 24px; bottom: -60px; width: 130px; height: 130px; border-radius: 50%; background: rgba(255,255,255,0.045); }
.hero-top { position: relative; display: flex; align-items: flex-start; justify-content: space-between; }
.hero-label { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.72); }
.hero-balance { font-size: 34px; font-weight: 700; letter-spacing: -1px; margin-top: 2px; line-height: 1.15; }
.hero-count {
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.85); font-size: 10.5px; font-weight: 600;
  border-radius: 99px; padding: 4px 11px;
}
.hero-progress-wrap { position: relative; margin-top: 14px; }
.hero-progress-bar { height: 7px; border-radius: 99px; background: rgba(255,255,255,0.16); overflow: hidden; }
.hero-progress-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, #f3b95a, var(--amber));
  transition: width .5s cubic-bezier(.22,.9,.32,1);
}
.hero-progress-note { font-size: 10.5px; color: rgba(255,255,255,0.6); margin-top: 5px; }
.hero-stats { position: relative; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
.hero-stat {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.13);
  border-radius: 15px; padding: 10px 12px;
}
.hero-stat-icon {
  width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.hero-stat-icon.up { background: rgba(134,239,172,0.18); color: #86efac; }
.hero-stat-icon.down { background: rgba(253,164,175,0.16); color: #fda4af; }
.hero-stat p:first-child { font-size: 10.5px; color: rgba(255,255,255,0.65); }
.hero-stat p:last-child { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }

/* ── Section heading ── */
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 10px;
}
.section-head h2 { font-size: 14px; font-weight: 700; color: var(--ink); }
.section-head span { font-size: 11px; color: var(--ink-faint); font-weight: 500; }

/* ── Category List ── */
#cat-list-section { position: relative; padding: 0 16px 122px; }
.cat-list { list-style: none; display: flex; flex-direction: column; gap: 9px; }
.cat-item {
  width: 100%; display: flex; align-items: center; gap: 13px;
  background: var(--card); border-radius: var(--r-lg); padding: 13px 14px;
  cursor: pointer; border: 1px solid var(--line); text-align: left;
  box-shadow: var(--shadow-sm);
  transition: transform .12s, box-shadow .15s;
  font-family: var(--font);
}
.cat-item:hover { box-shadow: var(--shadow-md); }
.cat-item:active { transform: scale(0.975); }
.cat-icon-wrap {
  width: 46px; height: 46px; border-radius: 15px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.cat-info { flex: 1; min-width: 0; }
.cat-info h3 { font-size: 15px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-info .cat-sub { font-size: 11.5px; color: var(--ink-faint); margin-top: 1px; }
.cat-mini-bar { height: 4px; border-radius: 99px; background: rgba(0,0,0,0.06); overflow: hidden; margin-top: 7px; width: 100%; }
.cat-mini-fill { height: 100%; border-radius: 99px; animation: growBar .6s cubic-bezier(.22,.9,.32,1) both; }
.cat-right { text-align: right; flex-shrink: 0; }
.cat-amount { font-size: 14.5px; font-weight: 700; letter-spacing: -0.2px; }
.cat-pct { font-size: 10px; color: var(--ink-faint); margin-top: 2px; }

/* ── Bottom Nav ── */
#bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 448px; padding: 0 14px 14px; z-index: 30;
  pointer-events: none;
}
.bottom-nav-inner {
  pointer-events: auto;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.92); border-radius: 22px; padding: 7px 18px;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--line);
  box-shadow: 0 -2px 24px rgba(20,30,25,0.10), 0 2px 6px rgba(20,30,25,0.05);
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  flex: 1; padding: 7px; border-radius: 13px; border: none; background: transparent;
  cursor: pointer; transition: transform .1s; color: var(--ink-faint); font-family: var(--font);
}
.nav-btn.active { color: var(--emerald-mid); }
.nav-btn:active { transform: scale(0.92); }
.nav-btn span { font-size: 10px; font-weight: 700; }
.fab {
  width: 56px; height: 56px; border-radius: 19px; border: none;
  background: linear-gradient(140deg, #10a873, var(--emerald-deep));
  color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: -30px;
  box-shadow: 0 6px 18px rgba(11,138,95,0.45), 0 0 0 5px var(--paper);
  transition: transform .12s;
}
.fab:active { transform: scale(0.9) rotate(90deg); }

/* ── Category Detail ── */
#cat-detail { min-height: 100vh; }
.cat-detail-header { position: relative; overflow: hidden; padding: 16px 16px 22px; color: #fff; border-radius: 0 0 28px 28px; }
.cat-deco1 { position: absolute; right: -36px; top: -36px; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,0.09); }
.cat-deco2 { position: absolute; left: -20px; bottom: -40px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.06); }
.cat-detail-nav { position: relative; display: flex; align-items: center; justify-content: space-between; }
.cat-detail-nav h2 { font-size: 16px; font-weight: 700; }
.back-btn {
  width: 38px; height: 38px; border-radius: 13px; border: 1px solid rgba(255,255,255,0.22);
  background: rgba(255,255,255,0.14); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: transform .1s;
}
.back-btn:active { transform: scale(0.9); }
.cat-detail-month-badge {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.22);
  border-radius: 10px; padding: 5px 10px; font-size: 11px; font-weight: 600;
}
.cat-summary-card {
  position: relative; margin-top: 18px; border-radius: 19px;
  background: rgba(255,255,255,0.13); border: 1px solid rgba(255,255,255,0.2);
  padding: 16px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.cat-summary-inner { display: flex; align-items: center; gap: 13px; }
.cat-summary-icon {
  width: 50px; height: 50px; border-radius: 15px;
  background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: #fff;
}
.cat-summary-info { flex: 1; }
.cat-summary-info p:first-child { font-size: 12px; color: rgba(255,255,255,0.75); }
.cat-summary-info p:last-child { font-size: 26px; font-weight: 700; letter-spacing: -0.8px; }
.cat-summary-right { text-align: right; font-size: 11px; color: rgba(255,255,255,0.8); }
.cat-body { padding: 18px 16px 122px; }

/* Transaction list */
.tx-date-group { margin-bottom: 18px; }
.tx-date-header { display: flex; align-items: center; justify-content: space-between; padding: 0 5px; margin-bottom: 7px; }
.tx-date-left { display: flex; align-items: center; gap: 8px; }
.tx-date-dot { width: 7px; height: 7px; border-radius: 50%; }
.tx-date-label { font-size: 12px; font-weight: 700; color: var(--ink-soft); }
.tx-date-total { font-size: 11px; font-weight: 600; color: var(--ink-faint); }
.tx-card { background: var(--card); border-radius: 17px; overflow: hidden; border: 1px solid var(--line); box-shadow: var(--shadow-sm); }
.tx-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--line); position: relative; overflow: hidden; }
.tx-row:last-child { border-bottom: none; }
.tx-icon { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tx-info { flex: 1; min-width: 0; }
.tx-title { font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; flex-wrap: wrap; }
.status-badge { border-radius: 6px; padding: 1px 7px; font-size: 10px; font-weight: 700; }
.status-baki { background: var(--rose-light); color: #b32638; }
.status-pending { background: var(--amber-light); color: #9a5b12; }
.status-paid { background: var(--emerald-light); color: var(--emerald-mid); }
.tx-note { font-size: 10.5px; color: var(--ink-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tx-amount { font-size: 14px; font-weight: 700; flex-shrink: 0; letter-spacing: -0.2px; }
.tx-options-btn {
  width: 30px; height: 30px; border-radius: 9px; border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: rgba(0,0,0,0.18); transition: background .1s, color .1s; flex-shrink: 0;
}
.tx-options-btn:hover { background: rgba(0,0,0,0.05); color: var(--ink-soft); }
.tx-delete-overlay {
  position: absolute; top: 0; bottom: 0; right: 0;
  display: flex; align-items: center; gap: 6px; padding: 0 12px;
  background: linear-gradient(90deg, transparent, #fff4f4 22%, #fff4f4);
  animation: fadeIn .15s ease-out;
}
.btn-delete {
  background: var(--rose); color: #fff; border: none; border-radius: 9px;
  padding: 7px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--font);
  transition: transform .1s;
}
.btn-delete:active { transform: scale(0.92); }
.btn-cancel {
  background: #fff; color: var(--ink-soft); border: 1px solid var(--line); border-radius: 9px;
  padding: 7px 14px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--font);
}
.add-dashed-btn {
  width: 100%; border: 2px dashed; border-radius: 16px; padding: 13px;
  background: transparent; cursor: pointer; font-size: 14px; font-weight: 700;
  font-family: var(--font); transition: transform .1s, background .15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.add-dashed-btn:active { transform: scale(0.98); }
.add-dashed-btn:hover { background: rgba(0,0,0,0.02); }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  background: var(--card); border-radius: var(--r-lg); padding: 42px 24px; text-align: center;
  border: 1px solid var(--line); box-shadow: var(--shadow-sm);
}
.empty-icon { width: 68px; height: 68px; border-radius: 20px; display: flex; align-items: center; justify-content: center; }
.empty-state h3 { margin-top: 16px; font-size: 16px; font-weight: 700; color: var(--ink); }
.empty-state p { margin-top: 4px; font-size: 13.5px; color: var(--ink-faint); }
.empty-add-btn {
  margin-top: 18px; border-radius: 13px; padding: 11px 24px;
  font-size: 14px; font-weight: 700; color: #fff; border: none; cursor: pointer;
  font-family: var(--font); transition: transform .1s; box-shadow: var(--shadow-sm);
}
.empty-add-btn:active { transform: scale(0.94); }

/* ── Todo ── */
.todo-input-row {
  display: flex; gap: 8px; background: var(--card); border-radius: 16px; padding: 8px;
  border: 1px solid var(--line); box-shadow: var(--shadow-sm); margin-bottom: 18px;
}
.todo-input {
  flex: 1; border-radius: 11px; background: var(--amber-light); padding: 11px 13px;
  font-size: 14px; border: 1px solid rgba(217,131,36,0.25); outline: none; font-family: var(--font);
  color: var(--ink); transition: border-color .15s, box-shadow .15s; min-width: 0;
}
.todo-input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(217,131,36,0.14); }
.todo-input::placeholder { color: var(--ink-faint); }
.todo-add-btn {
  background: var(--amber); color: #fff; border: none; border-radius: 11px;
  padding: 11px 18px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: var(--font);
  transition: transform .1s, opacity .15s; flex-shrink: 0;
}
.todo-add-btn:disabled { background: #d8d3c8; cursor: not-allowed; }
.todo-add-btn:active:not(:disabled) { transform: scale(0.92); }
.todo-section-label { font-size: 12px; font-weight: 700; padding: 0 5px; margin-bottom: 7px; }
.todo-card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid var(--line); box-shadow: var(--shadow-sm); margin-bottom: 18px; }
.todo-row { display: flex; align-items: center; gap: 12px; padding: 13px 15px; border-bottom: 1px solid var(--line); }
.todo-row:last-child { border-bottom: none; }
.todo-check {
  width: 22px; height: 22px; border-radius: 7px; border: 2px solid rgba(0,0,0,0.16);
  background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s, border-color .15s, transform .1s;
}
.todo-check:active { transform: scale(0.85); }
.todo-check.done { background: var(--emerald); border-color: var(--emerald); }
.todo-check svg { display: none; }
.todo-check.done svg { display: block; }
.todo-title { flex: 1; font-size: 14px; font-weight: 500; color: var(--ink); }
.todo-title.done { color: var(--ink-faint); text-decoration: line-through; }
.todo-del-btn {
  width: 30px; height: 30px; border-radius: 9px; border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: rgba(0,0,0,0.18); transition: background .1s, color .1s;
}
.todo-del-btn:hover { background: var(--rose-light); color: var(--rose); }

/* Progress */
.progress-row { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
.progress-bar { height: 6px; width: 66px; background: rgba(255,255,255,0.22); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: #fff; border-radius: 99px; transition: width .3s; }

/* ── Reports ── */
#reports-page { padding: 14px 16px 122px; display: flex; flex-direction: column; gap: 14px; }
.reports-hero {
  position: relative; overflow: hidden; border-radius: 24px;
  background: linear-gradient(150deg, #0c6b4a, var(--emerald-deep));
  padding: 20px; color: #fff;
  box-shadow: 0 10px 32px -8px rgba(4,56,43,0.45);
}
.reports-hero-deco { position: absolute; right: -28px; top: -28px; width: 130px; height: 130px; border-radius: 50%; background: rgba(255,255,255,0.07); }
.reports-hero > p:first-of-type { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.72); position: relative; }
.reports-hero-amount { font-size: 34px; font-weight: 700; letter-spacing: -1px; position: relative; margin: 2px 0; }
.reports-hero-sub { font-size: 11.5px; color: rgba(255,255,255,0.66); position: relative; }
.reports-hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; position: relative; }
.reports-hero-card {
  background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.14);
  border-radius: 15px; padding: 12px 14px;
}

/* Donut */
.donut-wrap { display: flex; align-items: center; gap: 18px; margin-bottom: 16px; }
.donut-box { position: relative; width: 116px; height: 116px; flex-shrink: 0; }
.donut-box svg { transform: rotate(-90deg); }
.donut-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.donut-center p:first-child { font-size: 9.5px; color: var(--ink-faint); }
.donut-center p:last-child { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.donut-legend { flex: 1; display: flex; flex-direction: column; gap: 7px; min-width: 0; }

.legend-pct { color: var(--ink-faint); font-weight: 600; }

.cat-breakdown-row { width: 100%; background: transparent; border: none; text-align: left; cursor: pointer; margin-bottom: 13px; font-family: var(--font); padding: 0; }
.cat-breakdown-row:last-child { margin-bottom: 0; }
.cat-breakdown-inner { display: flex; align-items: center; gap: 12px; }
.cat-breakdown-icon { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.cat-breakdown-top { display: flex; align-items: center; justify-content: space-between; }
.cat-breakdown-name { font-size: 13.5px; font-weight: 600; color: var(--ink); }
.cat-breakdown-amount { font-size: 13.5px; font-weight: 700; }
.cat-breakdown-bar-row { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
.cat-breakdown-bar { height: 6px; flex: 1; background: rgba(0,0,0,0.06); border-radius: 99px; overflow: hidden; }
.cat-breakdown-bar-fill { height: 100%; border-radius: 99px; animation: growBar .7s cubic-bezier(.22,.9,.32,1) both; }
.cat-breakdown-pct { font-size: 10px; font-weight: 600; color: var(--ink-faint); width: 30px; text-align: right; }

/* Daily chart */
.daily-chart { height: 124px; display: flex; align-items: flex-end; gap: 2px; }
.daily-bar-wrap { flex: 1; min-width: 5px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; position: relative; cursor: default; }
.daily-bar { width: 100%; border-radius: 3px 3px 1px 1px; transform-origin: bottom; animation: riseBar .5s cubic-bezier(.22,.9,.32,1) both; }
.daily-bar-tooltip {

}
.daily-bar-wrap:hover .daily-bar-tooltip { opacity: 1; }
.daily-chart-labels { display: flex; justify-content: space-between; font-size: 9.5px; color: var(--ink-faint); margin-top: 6px; font-weight: 500; }

/* Top expenses */
.top-spend-row { display: flex; align-items: center; gap: 11px; background: var(--paper); border-radius: 14px; padding: 10px 12px; margin-bottom: 8px; border: 1px solid var(--line); }
.top-spend-row:last-child { margin-bottom: 0; }
.top-rank {

}
.top-rank.gold { background: #fdf3dd; color: #a8720e; border-color: rgba(217,131,36,0.35); }
.top-spend-icon { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.top-spend-info { flex: 1; min-width: 0; }
.top-spend-title { font-size: 13.5px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.top-spend-cat { font-size: 10.5px; color: var(--ink-faint); }
.top-spend-amount { font-size: 13.5px; font-weight: 700; flex-shrink: 0; }

/* Tip card */
.tip-card {

}

.tip-body p:last-child { font-size: 12.5px; color: var(--ink-soft); margin-top: 3px; line-height: 1.55; }

/* ── Add Modal ── */
#add-modal-overlay {

}
#add-modal-overlay.open { display: flex; animation: fadeIn .2s ease-out; }
#add-modal {

}
.modal-handle { width: 42px; height: 4.5px; background: rgba(0,0,0,0.14); border-radius: 99px; margin: 0 auto 14px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-header h3 { font-size: 18px; font-weight: 700; color: var(--ink); }

}

.mode-toggle { display: flex; gap: 5px; background: #fff; border-radius: 15px; padding: 5px; border: 1px solid var(--line); margin-bottom: 18px; }
.mode-btn {

}
.mode-btn.active-tx { background: var(--emerald); color: #fff; box-shadow: 0 3px 8px rgba(11,138,95,0.3); }
.mode-btn.active-todo { background: var(--amber); color: #fff; box-shadow: 0 3px 8px rgba(217,131,36,0.3); }
.field-label { font-size: 12px; font-weight: 700; color: var(--ink-soft); margin-bottom: 7px; display: block; }
.field-input {
  width: 100%; border-radius: 14px; background: #fff; padding: 12px 15px;
  font-size: 14px; border: 1px solid var(--line); outline: none; font-family: var(--font);
  color: var(--ink); transition: border-color .15s, box-shadow .15s;
}
.field-input:focus { border-color: var(--emerald); box-shadow: 0 0 0 3px rgba(11,138,95,0.13); }
.field-input::placeholder { color: var(--ink-faint); }
.amount-wrap {
  display: flex; align-items: center; gap: 8px; background: #fff; border-radius: 14px;
  padding: 8px 15px; border: 1px solid var(--line); transition: border-color .15s, box-shadow .15s;
}
.amount-wrap:focus-within { border-color: var(--emerald); box-shadow: 0 0 0 3px rgba(11,138,95,0.13); }
.amount-currency { font-size: 21px; font-weight: 700; }
.amount-input {
  flex: 1; background: transparent; border: none; outline: none; font-size: 23px; font-weight: 700;
  color: var(--ink); font-family: var(--font); width: 0;
}
.amount-input::-webkit-outer-spin-button, .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.amount-preview { background: var(--emerald-light); color: var(--emerald-mid); font-size: 11px; font-weight: 700; border-radius: 99px; padding: 3px 10px; white-space: nowrap; }
.cat-chips-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
.cat-chips-scroll::-webkit-scrollbar { display: none; }
.cat-chip {
  flex-shrink: 0; display: flex; align-items: center; gap: 7px; border-radius: 13px; padding: 9px 13px;
  font-size: 12.5px; font-weight: 600; cursor: pointer; border: 1px solid var(--line); font-family: var(--font);
  background: #fff; color: var(--ink-soft); transition: transform .1s, box-shadow .15s;
}
.cat-chip:active { transform: scale(0.94); }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.save-btn {
  width: 100%; border-radius: 15px; padding: 15px; font-size: 15px; font-weight: 700;
  color: #fff; border: none; cursor: pointer; font-family: var(--font);
  background: linear-gradient(140deg, #10a873, var(--emerald-deep));

  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.save-btn:active:not(:disabled) { transform: scale(0.98); }
.save-btn:disabled { background: #cfcabf; box-shadow: none; opacity: 0.7; cursor: not-allowed; }

/* ── Menu Drawer ── */
#menu-overlay { position: fixed; inset: 0; z-index: 50; display: none; }
#menu-overlay.open { display: block; animation: fadeIn .2s ease-out; }
#menu-backdrop { position: absolute; inset: 0; background: rgba(15,25,20,0.45); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
#menu-drawer {
  position: absolute; top: 0; bottom: 0; left: 0; width: 82%; max-width: 310px;

  display: flex; flex-direction: column;
}
.menu-header {

}
.menu-header::after { content: ''; position: absolute; right: -30px; top: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.07); }
.menu-logo-icon {
  width: 50px; height: 50px; border-radius: 16px;
  background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.24);

}
.menu-header h2 { font-size: 22px; font-weight: 700; }
.menu-header p { font-size: 11px; color: rgba(255,255,255,0.68); }
.menu-items { padding: 12px; flex: 1; }
.menu-item {
  display: flex; align-items: center; gap: 12px; width: 100%; border: none;
  background: transparent; cursor: pointer; padding: 11px 12px; border-radius: 15px;
  text-align: left; font-family: var(--font); transition: background .15s; margin-bottom: 2px;
}
.menu-item:hover { background: rgba(255,255,255,0.75); }
.menu-item-icon {
  width: 38px; height: 38px; border-radius: 12px; background: #fff;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--line); flex-shrink: 0; color: var(--emerald-mid);
}
.menu-item.danger .menu-item-icon { color: var(--rose); }
.menu-item-label { font-size: 14px; font-weight: 700; color: var(--ink); }
.menu-item.danger .menu-item-label { color: var(--rose); }
.menu-item-sub { font-size: 10.5px; color: var(--ink-faint); }
.menu-divider { height: 1px; background: rgba(0,0,0,0.07); margin: 10px 4px; }
.menu-footer { padding: 16px 20px 20px; text-align: center; font-size: 10.5px; color: var(--ink-faint); line-height: 1.7; }

/* ── Utilities ── */
.hidden { display: none !important; }
button { font-family: var(--font); }
input, select { font-family: var(--font); }
select {
  width: 100%; border-radius: 14px; background: #fff; padding: 12px 15px;

}
select:focus { border-color: var(--emerald); box-shadow: 0 0 0 3px rgba(11,138,95,0.13); }
input[type="date"] {

.mb-2 { margin-bottom: 8px; } .mb-3 { margin-bottom: 13px; } .mb-4 { margin-bottom: 18px; }

@media (min-width: 640px) {
  #add-modal { border-radius: 28px; margin: 16px; width: calc(100% - 32px); }
  #add-modal-overlay { align-items: center; }
}
</style>

const BN_DIGITS = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
const BN_MONTHS = ['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];

function bn(n) { return String(n).replace(/\d/g, d => BN_DIGITS[parseInt(d)]); }
function bnTaka(n) {
  const abs = Math.abs(Math.round(n * 100) / 100);
  const sign = n < 0 ? '−' : '';
  return sign + '৳' + bn(abs.toLocaleString('en-IN'));
}
function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function monthKey(iso) { return iso.slice(0, 7); }
function monthLabel(key) {
  const parts = key.split('-');
  return BN_MONTHS[parseInt(parts[1]) - 1] + ' ' + bn(parts[0]);
}
function shiftMonthKey(month, delta) {
  const parts = month.split('-').map(Number);
  const d = new Date(parts[0], parts[1] - 1 + delta, 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function formatBnDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return bn(d.getDate()) + ' ' + BN_MONTHS[d.getMonth()];
}
function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Storage

    { id: uid(), categoryId: 'dues',    title: 'রহমান স্টোর',    amount: 450,   date: d(2),  status: 'baki' },

function makeSampleTodos() {
  return [
    { id: uid(), title: 'গ্যাস বিল দিতে হবে',       done: false, createdAt: todayISO() },

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let transactions = loadTx();
let todos = loadTd();
let currentMonth = monthKey(todayISO());
let currentView = 'home'; // 'home' | 'reports' | 'detail'
let openCatId = null;
let swipedTxId = null;

let modalMode = 'tx'; // 'tx' | 'todo'
let modalCatId = 'bazar';

// ══════════════════════════════════
// COMPUTED
// ══════════════════════════════════
function getMonthTxs() { return transactions.filter(t => monthKey(t.date) === currentMonth); }
function getIncome(txs) { return txs.filter(t => t.categoryId === 'income').reduce((s, t) => s + t.amount, 0); }
function getExpense(txs) { return txs.filter(t => t.categoryId !== 'income' && t.categoryId !== 'todo').reduce((s, t) => s + t.amount, 0); }

// ══════════════════════════════════
// NAVIGATION
// ══════════════════════════════════
function setView(v) {
  currentView = v;
  openCatId = null;
  toggle('home-page', v === 'home');
  toggle('reports-page', v === 'reports');
  toggle('cat-detail-page', false);
  document.getElementById('nav-home').classList.toggle('active', v === 'home');
  document.getElementById('nav-reports').classList.toggle('active', v === 'reports');
  document.getElementById('topbar').classList.remove('hidden');
  window.scrollTo({ top: 0 });
  if (v === 'home') renderHome();
  if (v === 'reports') renderReports();
}
function toggle(id, show) {
  const el = document.getElementById(id);
  el.classList.toggle('active', show);
  el.classList.toggle('hidden', !show);
}
function openCatDetail(catId) {
  openCatId = catId;
  currentView = 'detail';
  toggle('home-page', false);
  toggle('reports-page', false);
  toggle('cat-detail-page', true);
  document.getElementById('topbar').classList.add('hidden');
  window.scrollTo({ top: 0 });
  renderCatDetail(catId);
}
document.getElementById('back-btn').addEventListener('click', () => setView('home'));

// ══════════════════════════════════
// MONTH NAV
// ══════════════════════════════════
function updateMonthUI() {
  document.getElementById('month-label-text').textContent = monthLabel(currentMonth);
  document.getElementById('current-month-badge').classList.toggle('hidden', monthKey(todayISO()) !== currentMonth);
}
document.getElementById('prev-month-btn').addEventListener('click', () => { currentMonth = shiftMonthKey(currentMonth, -1); updateMonthUI(); rerender(); });
document.getElementById('next-month-btn').addEventListener('click', () => { currentMonth = shiftMonthKey(currentMonth, 1); updateMonthUI(); rerender(); });
document.getElementById('today-btn').addEventListener('click', () => { currentMonth = monthKey(todayISO()); updateMonthUI(); rerender(); });
function rerender() {
  if (currentView === 'home') renderHome();
  else if (currentView === 'reports') renderReports();
  else if (currentView === 'detail' && openCatId) renderCatDetail(openCatId);
}

// ══════════════════════════════════
// RENDER HOME
// ══════════════════════════════════
function renderHome() {
  const txs = getMonthTxs();
  const income = getIncome(txs);
  const expense = getExpense(txs);
  const balance = income - expense;

  document.getElementById('s-income').textContent = bnTaka(income);
  document.getElementById('s-expense').textContent = bnTaka(expense);
  document.getElementById('s-balance').textContent = bnTaka(balance);
  document.getElementById('tx-count-badge').textContent = bn(txs.length) + 'টি লেনদেন';

  const pct = income > 0 ? Math.min((expense / income) * 100, 100) : (expense > 0 ? 100 : 0);
  document.getElementById('hero-progress').style.width = pct + '%';
  document.getElementById('hero-progress-note').textContent =
    income > 0 ? 'আয়ের ' + bn(Math.round(pct)) + '% খরচ হয়েছে' : 'এই মাসে এখনো কোনো আয় যোগ হয়নি';

  const list = document.getElementById('cat-list');
  list.innerHTML = '';
  CATEGORIES.forEach((cat, idx) => {
    const items = txs.filter(t => t.categoryId === cat.id);
    const total = items.reduce((s, t) => s + t.amount, 0);
    const isTodo = cat.id === 'todo';
    const pendingTodos = isTodo ? todos.filter(t => !t.done).length : 0;
    const doneTodos = isTodo ? todos.filter(t => t.done).length : 0;
    const isExpenseCat = cat.type === 'expense' || cat.type === 'dues';
    const share = isExpenseCat && expense > 0 ? (total / expense) * 100 : 0;

    const li = document.createElement('li');
    li.className = 'anim-slide-up';
    li.style.animationDelay = (idx * 45) + 'ms';

    let sub, right;
    if (isTodo) {
      sub = bn(pendingTodos) + 'টি বাকি · ' + bn(doneTodos) + 'টি সম্পন্ন';
      right = '<p class="cat-amount" style="color:' + cat.color + '">' + bn(todos.length) + 'টি</p>';
    } else {
      sub = bn(items.length) + 'টি লেনদেন';
      right = '<p class="cat-amount" style="color:' + cat.color + '">' + bnTaka(total) + '</p>' +
        (isExpenseCat && total > 0 ? '<p class="cat-pct">মোট খরচের ' + bn(Math.round(share)) + '%</p>' : '');
    }

    li.innerHTML =
      '<button class="cat-item" onclick="openCatDetail(\'' + cat.id + '\')">' +
        '<div class="cat-icon-wrap" style="background:' + cat.bgLight + ';color:' + cat.color + '">' + icon(cat.icon, 21) + '</div>' +
        '<div class="cat-info">' +
          '<h3>' + cat.name + '</h3>' +
          '<p class="cat-sub">' + sub + '</p>' +
          (isExpenseCat && total > 0
            ? '<div class="cat-mini-bar"><div class="cat-mini-fill" style="width:' + Math.min(share, 100) + '%;background:' + cat.color + '"></div></div>'
            : '') +
        '</div>' +
        '<div class="cat-right">' + right + '</div>' +
      '</button>';
    list.appendChild(li);
  });
}

// RENDER REPORTS
// ══════════════════════════════════
function renderReports() {
  const txs = getMonthTxs();
  const income = getIncome(txs);
  const expense = getExpense(txs);
  const balance = income - expense;

  const breakdown = CATEGORIES
    .filter(c => c.type === 'expense' || c.type === 'dues')
    .map(c => ({ cat: c, total: txs.filter(t => t.categoryId === c.id).reduce((s, t) => s + t.amount, 0) }))
    .filter(b => b.total > 0)
    .sort((a, b) => b.total - a.total);
  const maxBar = Math.max.apply(null, breakdown.map(b => b.total).concat([1]));

  // Donut segments
  const R = 44, CIRC = 2 * Math.PI * R;
  let offset = 0;
  const donutSegs = breakdown.map(b => {
    const frac = expense > 0 ? b.total / expense : 0;
    const seg = '<circle cx="58" cy="58" r="' + R + '" fill="none" stroke="' + b.cat.color + '" stroke-width="13" stroke-dasharray="' + (frac * CIRC - 2) + ' ' + (CIRC - frac * CIRC + 2) + '" stroke-dashoffset="' + (-offset * CIRC) + '" stroke-linecap="butt"/>';
    offset += frac;
    return seg;
  }).join('');

  // Daily chart
  const y = parseInt(currentMonth.split('-')[0]);
  const mo = parseInt(currentMonth.split('-')[1]);
  const daysInMonth = new Date(y, mo, 0).getDate();
  const daily = [];
  for (let i = 1; i <= daysInMonth; i++) {
    const key = currentMonth + '-' + String(i).padStart(2, '0');
    const exp = txs.filter(t => t.date === key && t.categoryId !== 'income' && t.categoryId !== 'todo').reduce((s, t) => s + t.amount, 0);
    daily.push({ day: i, expense: exp });
  }
  const maxD = Math.max.apply(null, daily.map(d => d.expense).concat([1]));

  const topSpends = txs
    .filter(t => t.categoryId !== 'income' && t.categoryId !== 'todo')
    .slice().sort((a, b) => b.amount - a.amount).slice(0, 5);

  let tip;
  if (breakdown.length > 0) {
    tip = breakdown[0].cat.name + ' খাতে সবচেয়ে বেশি খরচ (' + bnTaka(breakdown[0].total) + ')। এই খাতে সচেতন থাকুন।';
  } else {
    tip = 'নিয়মিত হিসাব রাখলে মাস শেষে সাশ্রয় বেশি হয়।';
  }

  let html =
    '<div class="reports-hero anim-pop">' +
      '<div class="reports-hero-deco"></div>' +
      '<p>নিট ব্যালেন্স · ' + monthLabel(currentMonth) + '</p>' +
      '<p class="reports-hero-amount">' + bnTaka(balance) + '</p>' +
      '<p class="reports-hero-sub">' + (balance >= 0 ? 'সাশ্রয়ে আছেন, চালিয়ে যান' : 'সাবধান, খরচ আয়ের চেয়ে বেশি হচ্ছে') + '</p>' +
      '<div class="reports-hero-grid">' +
        '<div class="reports-hero-card"><p>মোট আয়</p><p>' + bnTaka(income) + '</p></div>' +
        '<div class="reports-hero-card"><p>মোট খরচ</p><p>' + bnTaka(expense) + '</p></div>' +
      '</div>' +
    '</div>';

  if (breakdown.length > 0) {
    html += '<div class="report-section anim-slide-up">' +
      '<h3>' + icon('pie', 16, 2.2) + 'খাতা অনুযায়ী খরচ</h3>' +
      '<div class="donut-wrap">' +
        '<div class="donut-box">' +
          '<svg width="116" height="116" viewBox="0 0 116 116">' +
            '<circle cx="58" cy="58" r="' + R + '" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="13"/>' +
            donutSegs +
          '</svg>' +
          '<div class="donut-center"><p>মোট খরচ</p><p>' + bnTaka(expense) + '</p></div>' +
        '</div>' +
        '<div class="donut-legend">' +
          breakdown.slice(0, 5).map(b =>
            '<div class="legend-row">' +
              '<span class="legend-dot" style="background:' + b.cat.color + '"></span>' +
              '<span class="legend-name">' + b.cat.name + '</span>' +
              '<span class="legend-pct">' + bn(Math.round((b.total / expense) * 100)) + '%</span>' +
            '</div>').join('') +
        '</div>' +
      '</div>' +
      breakdown.map(b => {
        const pct = expense > 0 ? (b.total / expense) * 100 : 0;
        return '<button class="cat-breakdown-row" onclick="openCatDetail(\'' + b.cat.id + '\')">' +
          '<div class="cat-breakdown-inner">' +
            '<div class="cat-breakdown-icon" style="background:' + b.cat.bgLight + ';color:' + b.cat.color + '">' + icon(b.cat.icon, 17) + '</div>' +
            '<div class="cat-breakdown-label">' +
              '<div class="cat-breakdown-top">' +
                '<span class="cat-breakdown-name">' + b.cat.name + '</span>' +
                '<span class="cat-breakdown-amount" style="color:' + b.cat.color + '">' + bnTaka(b.total) + '</span>' +
              '</div>' +
              '<div class="cat-breakdown-bar-row">' +
                '<div class="cat-breakdown-bar"><div class="cat-breakdown-bar-fill" style="width:' + (b.total / maxBar) * 100 + '%;background:' + b.cat.color + '"></div></div>' +
                '<span class="cat-breakdown-pct">' + bn(Math.round(pct)) + '%</span>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</button>';
      }).join('') +
    '</div>';
  }

  html += '<div class="report-section anim-slide-up" style="animation-delay:60ms">' +
    '<h3>' + icon('bars', 16, 2.2) + 'দৈনিক খরচ</h3>' +
    '<div class="daily-chart">' +
      daily.map((d, i) =>
        '<div class="daily-bar-wrap">' +
          '<div class="daily-bar-tooltip">' + bn(d.day) + ' তারিখ: ' + bnTaka(d.expense) + '</div>' +
          '<div class="daily-bar" style="height:' + (d.expense > 0 ? Math.max((d.expense / maxD) * 100, 5) : 2) + '%;background:' + (d.expense > 0 ? 'var(--emerald)' : 'rgba(0,0,0,0.05)') + ';animation-delay:' + (i * 12) + 'ms"></div>' +
        '</div>').join('') +
    '</div>' +
    '<div class="daily-chart-labels"><span>' + bn(1) + '</span><span>' + bn(Math.ceil(daysInMonth / 2)) + '</span><span>' + bn(daysInMonth) + '</span></div>' +
  '</div>';

  if (topSpends.length > 0) {
    html += '<div class="report-section anim-slide-up" style="animation-delay:120ms">' +
      '<h3>' + icon('fire', 16, 2.2) + 'সর্বোচ্চ খরচ</h3>' +
      topSpends.map((t, i) => {
        const c = getCat(t.categoryId);
        return '<div class="top-spend-row">' +
          '<div class="top-rank' + (i === 0 ? ' gold' : '') + '">' + bn(i + 1) + '</div>' +
          '<div class="top-spend-icon" style="background:' + c.bgLight + ';color:' + c.color + '">' + icon(c.icon, 15) + '</div>' +
          '<div class="top-spend-info">' +
            '<p class="top-spend-title">' + esc(t.title) + '</p>' +
            '<p class="top-spend-cat">' + c.name + '</p>' +
          '</div>' +
          '<p class="top-spend-amount" style="color:' + c.color + '">' + bnTaka(t.amount) + '</p>' +
        '</div>';
      }).join('') +
    '</div>';
  }

  html += '<div class="tip-card anim-slide-up" style="animation-delay:180ms">' +
    '<div class="tip-icon">' + icon('bulb', 19, 2.2) + '</div>' +
    '<div class="tip-body"><p>পরামর্শ</p><p>' + tip + '</p></div>' +
  '</div>';

  document.getElementById('reports-page').innerHTML = html;
}

function renderCatDetail(catId) {
  const cat = getCat(catId);
  const isTodo = catId === 'todo';
  swipedTxId = null;

  const hdr = document.getElementById('cat-detail-header');
  hdr.style.background = 'linear-gradient(150deg, ' + cat.color + ', ' + shade(cat.color, -35) + ')';
  document.getElementById('cat-detail-title').textContent = cat.name;
  document.getElementById('cat-detail-month').textContent = monthLabel(currentMonth);
  document.getElementById('cat-detail-icon-wrap').innerHTML = icon(cat.icon, 24);

  const monthTxs = transactions.filter(t => t.categoryId === catId && monthKey(t.date) === currentMonth);
  const total = monthTxs.reduce((s, t) => s + t.amount, 0);

  document.getElementById('cat-summary-label').textContent = isTodo ? 'মোট টাস্ক' : (cat.type === 'income' ? 'মোট আয়' : 'মোট খরচ');
  document.getElementById('cat-summary-amount').textContent = isTodo ? bn(todos.length) + 'টি' : bnTaka(total);

  const right = document.getElementById('cat-summary-right');
  if (isTodo) {
    const done = todos.filter(t => t.done).length;
    right.innerHTML = '<div class="progress-row">' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + (todos.length ? (done / todos.length) * 100 : 0) + '%"></div></div>' +
      '<span style="font-size:12px;color:rgba(255,255,255,0.9)">' + bn(done) + '/' + bn(todos.length) + '</span></div>';
  } else {
    right.innerHTML = '<p>' + bn(monthTxs.length) + 'টি লেনদেন</p>';
  }

  const body = document.getElementById('cat-body');
  if (isTodo) {
    body.innerHTML = renderTodoSection();
    bindTodoEvents();
  } else {
    body.innerHTML = renderTxSection(monthTxs, cat);
  }
}

// Darken a hex color by pct (-100..100)
function shade(hex, pct) {
  const n = parseInt(hex.slice(1), 16);
  const f = 1 + pct / 100;
  const r = Math.min(255, Math.max(0, Math.round(((n >> 16) & 255) * f)));
  const g = Math.min(255, Math.max(0, Math.round(((n >> 8) & 255) * f)));
  const b = Math.min(255, Math.max(0, Math.round((n & 255) * f)));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function renderTxSection(txs, cat) {
  if (txs.length === 0) {
    return '<div class="empty-state anim-fade-in">' +
      '<div class="empty-icon" style="background:' + cat.bgLight + ';color:' + cat.color + '">' + icon(cat.icon, 30) + '</div>' +
      '<h3>কোনো লেনদেন নেই</h3>' +
      '<p>এই মাসে ' + cat.name + '-এ কিছু যোগ করুন</p>' +
      '<button class="empty-add-btn" style="background:' + cat.color + '" onclick="openAddModal(\'' + cat.id + '\')">＋ যোগ করুন</button>' +
    '</div>';
  }

  const grouped = new Map();
  txs.slice().sort((a, b) => b.date > a.date ? 1 : -1).forEach(t => {
    if (!grouped.has(t.date)) grouped.set(t.date, []);
    grouped.get(t.date).push(t);
  });

  let html = '<div>';
  let gi = 0;
  grouped.forEach((list, date) => {
    html += '<div class="tx-date-group anim-slide-up" style="animation-delay:' + (gi++ * 50) + 'ms">' +
      '<div class="tx-date-header">' +
        '<div class="tx-date-left">' +
          '<div class="tx-date-dot" style="background:' + cat.color + '"></div>' +
          '<span class="tx-date-label">' + formatBnDate(date) + '</span>' +
        '</div>' +
        '<span class="tx-date-total">' + bnTaka(list.reduce((s, t) => s + t.amount, 0)) + '</span>' +
      '</div>' +
      '<div class="tx-card">';
    list.forEach(t => {
      const statusHtml =
        t.status === 'baki' ? '<span class="status-badge status-baki">বাকি</span>' :
        t.status === 'pending' ? '<span class="status-badge status-pending">অপেক্ষমান</span>' :
        t.status === 'paid' ? '<span class="status-badge status-paid">পরিশোধিত</span>' : '';
      const noteHtml = t.note ? '<p class="tx-note">' + esc(t.note) + '</p>' : '';
      html += '<div class="tx-row" id="tx-row-' + t.id + '">' +
        '<div class="tx-icon" style="background:' + cat.bgLight + ';color:' + cat.color + '">' + icon(cat.icon, 16) + '</div>' +
        '<div class="tx-info">' +
          '<p class="tx-title">' + esc(t.title) + '</p>' +
          '<div class="tx-meta">' + statusHtml + noteHtml + '</div>' +
        '</div>' +
        '<p class="tx-amount" style="color:' + cat.color + '">' + bnTaka(t.amount) + '</p>' +
        '<button class="tx-options-btn" aria-label="অপশন" onclick="toggleTxSwipe(\'' + t.id + '\')">' +
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="6" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="18" r="1.6"/></svg>' +
        '</button>' +
        '<div class="tx-delete-overlay hidden" id="tx-del-' + t.id + '">' +
          '<button class="btn-delete" onclick="deleteTx(\'' + t.id + '\')">মুছুন</button>' +
          '<button class="btn-cancel" onclick="toggleTxSwipe(\'' + t.id + '\')">না</button>' +
        '</div>' +
      '</div>';
    });
    html += '</div></div>';
  });

  html += '<button class="add-dashed-btn" style="border-color:' + cat.color + '55;color:' + cat.color + '" onclick="openAddModal(\'' + cat.id + '\')">＋ নতুন যোগ করুন</button>';
  html += '</div>';
  return html;
}

function toggleTxSwipe(id) {
  if (swipedTxId && swipedTxId !== id) {
    const prev = document.getElementById('tx-del-' + swipedTxId);
    if (prev) prev.classList.add('hidden');
  }
  swipedTxId = swipedTxId === id ? null : id;
  const el = document.getElementById('tx-del-' + id);
  if (el) el.classList.toggle('hidden', swipedTxId !== id);
}

function deleteTx(id) {
  transactions = transactions.filter(t => t.id !== id);
  saveTx(transactions);
  swipedTxId = null;
  if (currentView === 'detail' && openCatId) renderCatDetail(openCatId);
}

// ══════════════════════════════════
// TODO SECTION
// ══════════════════════════════════
function renderTodoSection() {
  const pending = todos.filter(t => !t.done);
  const done = todos.filter(t => t.done);

  let html = '<div>' +
    '<div class="todo-input-row">' +
      '<input type="text" class="todo-input" id="todo-input" placeholder="নতুন টাস্ক লিখুন..." />' +
      '<button class="todo-add-btn" id="todo-add-btn" disabled onclick="addTodo()">যোগ</button>' +
    '</div>';

  const rowHtml = t =>
    '<div class="todo-row">' +
      '<button class="todo-check' + (t.done ? ' done' : '') + '" aria-label="টাস্ক সম্পন্ন করুন" onclick="toggleTodo(\'' + t.id + '\')">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L20 7"/></svg>' +
      '</button>' +
      '<p class="todo-title' + (t.done ? ' done' : '') + '">' + esc(t.title) + '</p>' +
      '<button class="todo-del-btn" aria-label="টাস্ক মুছুন" onclick="deleteTodo(\'' + t.id + '\')">' +
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>' +
      '</button>' +
    '</div>';

  if (pending.length > 0) {
    html += '<p class="todo-section-label" style="color:var(--ink-soft)">অপেক্ষমান (' + bn(pending.length) + 'টি)</p>' +
      '<div class="todo-card anim-slide-up">' + pending.map(rowHtml).join('') + '</div>';
  }
  if (done.length > 0) {
    html += '<p class="todo-section-label" style="color:var(--ink-faint)">সম্পন্ন (' + bn(done.length) + 'টি)</p>' +
      '<div class="todo-card anim-slide-up" style="opacity:0.85">' + done.map(rowHtml).join('') + '</div>';
  }
  if (todos.length === 0) {
    html += '<div class="empty-state anim-fade-in">' +
      '<div class="empty-icon" style="background:var(--amber-light);color:var(--amber)">' + icon('check', 30) + '</div>' +
      '<h3>কোনো টাস্ক নেই</h3>' +
      '<p>উপরে টাইপ করে নতুন টাস্ক যোগ করুন</p>' +
    '</div>';
  }
  html += '</div>';
  return html;
}

function bindTodoEvents() {
  const inp = document.getElementById('todo-input');
  const btn = document.getElementById('todo-add-btn');
  if (!inp || !btn) return;
  inp.addEventListener('input', () => { btn.disabled = !inp.value.trim(); });
  inp.addEventListener('keydown', e => {
    if (e.nativeEvent && e.nativeEvent.isComposing) return;
    if (e.isComposing || e.keyCode === 229) return;
    if (e.key === 'Enter' && inp.value.trim()) addTodo();
  });
}

function addTodo() {
  const inp = document.getElementById('todo-input');
  if (!inp || !inp.value.trim()) return;
  todos = [{ id: uid(), title: inp.value.trim(), done: false, createdAt: todayISO() }].concat(todos);
  saveTd(todos);
  renderCatDetail('todo');
  setTimeout(() => { const el = document.getElementById('todo-input'); if (el) el.focus(); }, 50);
}
function toggleTodo(id) {
  todos = todos.map(t => t.id === id ? Object.assign({}, t, { done: !t.done }) : t);
  saveTd(todos);
  renderCatDetail('todo');
}
function deleteTodo(id) {
  todos = todos.filter(t => t.id !== id);
  saveTd(todos);
  renderCatDetail('todo');
}

// ADD MODAL
// ══════════════════════════════════
function openAddModal(defaultCat) {
  modalMode = defaultCat === 'todo' ? 'todo' : 'tx';
  modalCatId = (defaultCat && defaultCat !== 'todo') ? defaultCat : 'bazar';

  resetModalFields();
  renderModalCatChips();
  updateModalUI();

  const overlay = document.getElementById('add-modal-overlay');
  const modal = document.getElementById('add-modal');
  overlay.classList.add('open');
  modal.classList.remove('anim-sheet');
  void modal.offsetWidth;
  modal.classList.add('anim-sheet');
  setTimeout(() => document.getElementById('modal-title-input').focus(), 320);
}

function closeAddModal(e) {
  if (e && e.target !== document.getElementById('add-modal-overlay')) return;
  document.getElementById('add-modal-overlay').classList.remove('open');
}

function resetModalFields() {
  document.getElementById('modal-title-input').value = '';
  document.getElementById('modal-amount').value = '';
  document.getElementById('modal-date').value = todayISO();
  const noteEl = document.getElementById('modal-note');
  if (noteEl) noteEl.value = '';
  document.getElementById('amount-preview').classList.add('hidden');
}

function setMode(m) { modalMode = m; updateModalUI(); }

function updateModalUI() {
  const isTodo = modalMode === 'todo';
  document.getElementById('modal-title').textContent = isTodo ? 'নতুন টাস্ক' : 'নতুন লেনদেন';
  document.getElementById('mode-tx-btn').className = 'mode-btn' + (modalMode === 'tx' ? ' active-tx' : '');
  document.getElementById('mode-todo-btn').className = 'mode-btn' + (modalMode === 'todo' ? ' active-todo' : '');
  document.getElementById('cat-chips-wrap').classList.toggle('hidden', isTodo);
  document.getElementById('amount-wrap-outer').classList.toggle('hidden', isTodo);
  document.getElementById('date-status-row').classList.toggle('hidden', isTodo);
  document.getElementById('title-label').textContent = isTodo ? 'কী করতে হবে?' : 'বিবরণ';
  document.getElementById('modal-title-input').placeholder = isTodo ? 'যেমন: গ্যাস বিল দিতে হবে' : 'যেমন: বাজার করলাম';

  const saveBtn = document.getElementById('save-btn');
  saveBtn.style.background = isTodo ? 'linear-gradient(140deg, #e59a3d, #a8720e)' : '';
  saveBtn.style.boxShadow = isTodo ? '0 5px 16px rgba(217,131,36,0.35)' : '';

  if (!isTodo) {
    const cat = getCat(modalCatId);
    document.getElementById('amount-currency').style.color = cat.color;
    const showStatus = cat.type === 'dues' || modalCatId === 'monthly' || modalCatId === 'madrasa';
    const snContainer = document.getElementById('status-or-note');
    if (showStatus) {
      snContainer.innerHTML = '<label class="field-label" for="modal-status">অবস্থা</label>' +
        '<select id="modal-status">' +
          '<option value="paid">পরিশোধিত ✓</option>' +
          '<option value="pending">অপেক্ষমান</option>' +
          '<option value="baki">বাকি আছে</option>' +
        '</select>';
    } else {
      snContainer.innerHTML = '<label class="field-label" for="modal-note">নোট (ঐচ্ছিক)</label>' +
        '<input type="text" class="field-input" id="modal-note" placeholder="মন্তব্য..." />';
    }
  }
  validateSaveBtn();
}

function renderModalCatChips() {
  const wrap = document.getElementById('cat-chips');
  wrap.innerHTML = CATEGORIES.filter(c => c.id !== 'todo').map(c => {
    const sel = c.id === modalCatId;
    return '<button class="cat-chip" style="' + (sel ? 'background:' + c.bgLight + ';color:' + c.color + ';border-color:' + c.color + ';box-shadow:0 0 0 1px ' + c.color : '') + '" onclick="selectModalCat(\'' + c.id + '\')">' +
      icon(c.icon, 14) + c.name + '</button>';
  }).join('');
}

function selectModalCat(id) {
  modalCatId = id;
  renderModalCatChips();
  updateModalUI();
}

function validateSaveBtn() {
  const title = document.getElementById('modal-title-input').value.trim();
  const amountEl = document.getElementById('modal-amount');
  const amount = parseFloat(amountEl ? amountEl.value : '0') || 0;
  const valid = title.length > 0 && (modalMode === 'todo' || amount > 0);
  document.getElementById('save-btn').disabled = !valid;
}

document.getElementById('modal-title-input').addEventListener('input', validateSaveBtn);
document.getElementById('modal-title-input').addEventListener('keydown', e => {
  if (e.isComposing || e.keyCode === 229) return;
  if (e.key === 'Enter') { const btn = document.getElementById('save-btn'); if (!btn.disabled) handleSave(); }
});
document.getElementById('modal-amount').addEventListener('input', () => {
  validateSaveBtn();
  const val = parseFloat(document.getElementById('modal-amount').value) || 0;
  const prev = document.getElementById('amount-preview');
  if (val > 0) { prev.textContent = bnTaka(val); prev.classList.remove('hidden'); }
  else { prev.classList.add('hidden'); }
});

function handleSave() {
  const title = document.getElementById('modal-title-input').value.trim();
  if (!title) return;

  if (modalMode === 'todo') {
    todos = [{ id: uid(), title, done: false, createdAt: todayISO() }].concat(todos);
    saveTd(todos);
  } else {
    const amount = parseFloat(document.getElementById('modal-amount').value) || 0;
    if (!amount) return;
    const date = document.getElementById('modal-date').value || todayISO();
    const cat = getCat(modalCatId);
    const showStatus = cat.type === 'dues' || modalCatId === 'monthly' || modalCatId === 'madrasa';
    const statusEl = document.getElementById('modal-status');
    const noteEl = document.getElementById('modal-note');
    const tx = {
      id: uid(), categoryId: modalCatId, title, amount, date,
      note: (!showStatus && noteEl && noteEl.value.trim()) || undefined,
      status: showStatus && statusEl ? statusEl.value : undefined,
    };
    transactions = [tx].concat(transactions);
    saveTx(transactions);
    // Jump to the month of the added tx so user sees it
    currentMonth = monthKey(date);
    updateMonthUI();
  }

  document.getElementById('add-modal-overlay').classList.remove('open');
  rerender();
}

// ══════════════════════════════════
// MENU DRAWER
// ══════════════════════════════════
document.getElementById('menu-open-btn').addEventListener('click', () => {
  const overlay = document.getElementById('menu-overlay');
  const drawer = document.getElementById('menu-drawer');
  overlay.classList.add('open');
  drawer.classList.remove('anim-slide-left');
  void drawer.offsetWidth;
  drawer.classList.add('anim-slide-left');
});
function closeMenu(e) {
  if (!e || e.target === document.getElementById('menu-overlay') || e.target === document.getElementById('menu-backdrop')) {
    document.getElementById('menu-overlay').classList.remove('open');
  }
}
function menuNavigate(v) {
  document.getElementById('menu-overlay').classList.remove('open');
  setView(v);
}
function handleClearAll() {
  if (confirm('সব তথ্য মুছে ফেলতে চান? এটা পূর্বাবস্থায় ফেরানো যাবে না।')) {
    transactions = [];
    todos = [];
    saveTx(transactions);
    saveTd(todos);
    document.getElementById('menu-overlay').classList.remove('open');
    setView('home');
  }
}

// ══════════════════════════════════
// FAB
// ══════════════════════════════════
document.getElementById('fab-btn').addEventListener('click', () => {
  openAddModal(openCatId || undefined);
});

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
updateMonthUI();
renderHome();
</script>
</body>
</html>
