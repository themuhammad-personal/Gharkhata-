plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ghorkhata.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.ghorkhata.app"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            // Signed with the debug key so the APK is directly installable.
            // For Play Store publishing, replace with a proper release keystore.
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
