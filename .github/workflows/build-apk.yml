name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Always bundle the latest web app into the APK.
      - name: Sync latest web app into Android assets
        run: |
          if [ -f public/ghorkhata.html ]; then
            cp public/ghorkhata.html android/app/src/main/assets/index.html
            echo "Synced public/ghorkhata.html -> android assets"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build release APK
        working-directory: android
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Locate and rename APK
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found!"
            find android/app/build/outputs -type f || true
            exit 1
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="manual-${GITHUB_SHA::7}"
          fi
          cp "$APK" "Ghorkhata-${VERSION}.apk"
          echo "Built: Ghorkhata-${VERSION}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghorkhata-apk
          path: Ghorkhata-*.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Ghorkhata-*.apk
          generate_release_notes: true
